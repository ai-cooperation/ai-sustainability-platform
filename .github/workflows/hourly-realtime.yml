name: Hourly Real-Time Update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create data directories
        run: mkdir -p data/realtime

      - name: Run Carbon Intensity UK (real-time)
        continue-on-error: true
        run: |
          uv run python -c "
          from src.connectors.energy.carbon_intensity_uk import CarbonIntensityUKConnector
          c = CarbonIntensityUKConnector()
          r = c.run()
          r.data.to_json('data/realtime/carbon_intensity_uk.json', orient='records', indent=2)
          print(f'Carbon Intensity UK: {r.record_count} records')
          "

      - name: Run Air Quality (real-time)
        continue-on-error: true
        run: |
          uv run python -c "
          from src.connectors.environment.open_meteo_air_quality import OpenMeteoAirQualityConnector
          c = OpenMeteoAirQualityConnector()
          r = c.run()
          r.data.to_json('data/realtime/air_quality.json', orient='records', indent=2)
          print(f'Air Quality: {r.record_count} records')
          "

      - name: Run Weather (real-time)
        continue-on-error: true
        run: |
          uv run python -c "
          from src.connectors.climate.open_meteo_weather import OpenMeteoWeatherConnector
          c = OpenMeteoWeatherConnector()
          r = c.run()
          r.data.to_json('data/realtime/weather.json', orient='records', indent=2)
          print(f'Weather: {r.record_count} records')
          "

      - name: Run Taiwan AQI (real-time)
        continue-on-error: true
        run: |
          uv run python -c "
          from src.connectors.environment.tw_epa_aqi import TwEpaAqiConnector
          c = TwEpaAqiConnector()
          r = c.run()
          r.data.to_json('data/realtime/tw_aqi.json', orient='records', indent=2, force_ascii=False)
          print(f'Taiwan AQI: {r.record_count} records')
          "

      - name: Run Taiwan Reservoir (real-time)
        continue-on-error: true
        run: |
          uv run python -c "
          from src.connectors.environment.tw_wra_reservoir import TwWraReservoirConnector
          c = TwWraReservoirConnector()
          r = c.run()
          r.data.to_json('data/realtime/tw_reservoir.json', orient='records', indent=2, force_ascii=False)
          print(f'Taiwan Reservoir: {r.record_count} records')
          "

      - name: Commit realtime data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/realtime/ || true
          git diff --cached --quiet || git commit -m "chore: hourly realtime update $(date -u +%Y-%m-%dT%H:00Z)"
          git push || true
