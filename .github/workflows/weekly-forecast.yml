name: Weekly AI Forecast

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at UTC 08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run AI Forecast
        run: |
          uv run python -c "
          import json
          from datetime import datetime, UTC
          from src.decision.orchestrator import ForecastOrchestrator

          orchestrator = ForecastOrchestrator()

          questions = [
              'Will UK grid carbon intensity exceed 200g CO2/kWh in the next 7 days?',
              'Will global renewable energy share exceed 32% by end of Q2 2026?',
              'Will PM2.5 levels in major Asian cities improve in the next month?',
          ]

          results = []
          for q in questions:
              try:
                  result = orchestrator.run_forecast(q)
                  results.append({
                      'question': result.question,
                      'probability': result.probability,
                      'confidence': result.confidence,
                      'reasoning': result.reasoning,
                      'positions': [
                          {'agent': p.agent_name, 'probability': p.probability, 'reasoning': p.reasoning}
                          for p in result.positions
                      ],
                      'created_at': str(result.created_at),
                  })
                  print(f'Forecast: {q[:50]}... -> {result.probability:.0%} ({result.confidence})')
              except Exception as e:
                  print(f'FAILED: {q[:50]}... -> {e}')

          with open('data/forecasts/latest.json', 'w') as f:
              json.dump(results, f, indent=2)
          print(f'Completed {len(results)} forecasts')
          "

      - name: Commit forecast results
        run: |
          mkdir -p data/forecasts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecasts/ || true
          git diff --cached --quiet || git commit -m "chore: weekly AI forecast $(date -u +%Y-%m-%d)"
          git push || true
