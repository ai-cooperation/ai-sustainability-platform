name: Daily Pipeline Update

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at UTC 06:00 (Taiwan 14:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipelines:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      ELECTRICITY_MAPS_API_KEY: ${{ secrets.ELECTRICITY_MAPS_API_KEY }}
      NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
      NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
      COPERNICUS_CDS_KEY: ${{ secrets.COPERNICUS_CDS_KEY }}
      OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
      AQICN_API_TOKEN: ${{ secrets.AQICN_API_TOKEN }}
      GLOBAL_FOREST_WATCH_API_KEY: ${{ secrets.GLOBAL_FOREST_WATCH_API_KEY }}
      USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
      GBIF_USERNAME: ${{ secrets.GBIF_USERNAME }}
      GBIF_PASSWORD: ${{ secrets.GBIF_PASSWORD }}
      CLIMATIQ_API_KEY: ${{ secrets.CLIMATIQ_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create output directories
        run: |
          mkdir -p data/processed/energy data/processed/climate data/processed/environment
          mkdir -p data/processed/agriculture data/processed/carbon data/processed/cross_domain
          mkdir -p data/forecasts data/dashboard

      - name: Run Energy Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.energy import EnergyPipeline; EnergyPipeline().run()"

      - name: Run Climate Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.climate import ClimatePipeline; ClimatePipeline().run()"

      - name: Run Environment Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.environment import EnvironmentPipeline; EnvironmentPipeline().run()"

      - name: Run Agriculture Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.agriculture import AgriculturePipeline; AgriculturePipeline().run()"

      - name: Run Carbon Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.carbon import CarbonPipeline; CarbonPipeline().run()"

      - name: Run Cross-Domain Pipeline
        continue-on-error: true
        run: uv run python -c "from src.pipelines.cross_domain import CrossDomainPipeline; CrossDomainPipeline().run()"

      - name: Run AI Forecast
        continue-on-error: true
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          from src.decision.orchestrator import ForecastOrchestrator

          Path('data/forecasts').mkdir(parents=True, exist_ok=True)
          orchestrator = ForecastOrchestrator()
          questions = [
              'Will UK grid carbon intensity exceed 200g CO2/kWh in the next 7 days?',
              'Will global renewable energy share exceed 32% by end of Q2 2026?',
              'Will PM2.5 levels in major Asian cities improve in the next month?',
          ]

          results = []
          for q in questions:
              try:
                  r = orchestrator.run_forecast(q)
                  results.append({
                      'question': r.question,
                      'probability': r.probability,
                      'confidence': r.confidence,
                      'reasoning': r.reasoning,
                      'positions': [
                          {'agent': p.agent_name, 'probability': p.probability, 'reasoning': p.reasoning}
                          for p in r.positions
                      ],
                      'created_at': str(r.created_at),
                  })
                  print(f'OK: {q[:50]}... -> {r.probability:.0%}')
              except Exception as e:
                  print(f'FAIL: {q[:50]}... -> {e}')

          with open('data/forecasts/latest.json', 'w') as f:
              json.dump(results, f, indent=2)
          print(f'Saved {len(results)} forecasts')
          "

      - name: Export dashboard JSON
        continue-on-error: true
        run: uv run python scripts/export_dashboard_json.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ data/status/ data/forecasts/ data/dashboard/ || true
          git diff --cached --quiet || git commit -m "chore: daily pipeline update $(date -u +%Y-%m-%d)"
          git push || true

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_number }}
          path: data/processed/
          retention-days: 30
